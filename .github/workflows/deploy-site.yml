name: Deploy site

# Builds and deploys the SSR site to Cloudflare Workers. Runs ONLY on code or
# article changes — NOT on hourly data (data is live from D1 at request time, so
# it never needs a redeploy). This is the counterpart to hourly-refresh.yml:
#   hourly-refresh → data → D1        (no deploy)
#   deploy-site    → code/content → Workers
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.worker.toml'
      - 'tsconfig.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-site
  cancel-in-progress: true # a newer deploy supersedes an in-flight one

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      # Cloudflare Worker ambient types (D1Database, cloudflare:workers) — generated
      # from wrangler.worker.toml, gitignored, so regenerate before the typed build.
      - name: Generate CF types
        run: npm run cf-types

      - name: Build
        run: npm run build

      # Deploy the SSR worker + static assets. The Astro adapter writes a COMPLETE
      # deploy config to dist/server/wrangler.json (correct main/entry, assets dir,
      # and the merged D1/KV bindings) — deploy with THAT, not the source
      # wrangler.worker.toml (which is bindings-only and lacks main/assets).
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy -c dist/server/wrangler.json
