name: Hourly data refresh

# SSR architecture: the site reads Cloudflare D1 at request time, so a data
# refresh only needs to (1) pull durable state back from D1, (2) rebuild the
# warehouse from the APIs, and (3) publish it to D1. It does NOT commit JSON,
# rebuild the site, or deploy — SSR pages pick up new data automatically (the
# edge cache revalidates within its stale-while-revalidate window). Site deploys
# happen on code/article changes via deploy-site.yml, not on hourly data.
on:
  # Triggered EXTERNALLY by the Cloudflare Cron Worker (workers/cron-trigger) —
  # GitHub's own scheduled/cron trigger has been unreliable, so CF's reliable
  # cron dispatches this every 30 min. Also runnable manually from the Actions tab.
  workflow_dispatch: {}
  # (No `schedule:` block on purpose — see workers/cron-trigger.)

concurrency:
  group: hourly-refresh
  cancel-in-progress: false # never interrupt a D1 publish mid-flight

# No `contents: write` — we no longer commit anything. Durable state (KO−1h
# freeze snapshots + odds history) now lives in D1, pulled back each run.

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      REFRESH: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install pipeline deps
        working-directory: data-pipeline
        run: npm ci

      # Raw API responses are cached by fixture id under data-pipeline/sources/ so
      # warm runs fetch only newly-changed fixtures. Split restore/save so a partial
      # cold run (which can 429) still persists what it fetched. This is a pure
      # speed cache — losing it just makes one run slower, never loses data.
      - name: Restore fetch cache
        id: fetch-cache
        uses: actions/cache/restore@v4
        with:
          path: data-pipeline/sources
          key: af-sources-v1
          restore-keys: af-sources-

      # Pull durable state (KO−1h freeze snapshots + odds-movement history) BACK
      # from remote D1 into the local JSON stores, so the build accumulates onto
      # the prior state instead of starting empty. D1 is the persistent home now;
      # this makes the round-trip (pull → merge new captures → publish) closed.
      # Must run BEFORE build:warehouse. Safe on first run (falls back to empty).
      - name: Pull durable state from D1
        working-directory: data-pipeline
        run: npm run pull:durable

      - name: Refresh warehouse (fetch → build → export)
        working-directory: data-pipeline
        run: |
          npm run build:warehouse
          npm run export

      - name: Save fetch cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data-pipeline/sources
          key: af-sources-v1-${{ github.run_id }}

      # The single output that makes the live site fresh: publish the full
      # warehouse to D1 (full replace, incl. the merged durable state). SSR pages
      # read this on the next request within the cache's SWR window. No commit,
      # no rebuild, no deploy.
      - name: Publish warehouse to Cloudflare D1
        working-directory: data-pipeline
        run: npm run publish:d1
