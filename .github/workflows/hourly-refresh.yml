name: Hourly data refresh

# Runs every hour: pulls fresh fixtures/results/odds from API-Football (+ SofaScore),
# rebuilds the warehouse, re-exports the site JSON, commits it, deploys the site,
# and publishes the full warehouse to Cloudflare D1 for the writer agents.
on:
  schedule:
    - cron: '7 * * * *' # hourly at :07 (off the top of the hour to dodge congestion)
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: hourly-refresh
  cancel-in-progress: false # never interrupt a publish mid-flight

permissions:
  contents: write # to commit the refreshed JSON exports

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      REFRESH: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install site deps
        run: npm ci

      - name: Install pipeline deps
        working-directory: data-pipeline
        run: npm ci

      # The pipeline's fetchers cache raw responses under data-pipeline/sources/.
      # REFRESH=1 re-fetches only the live fixtures list + standings; per-fixture
      # detail is cached by id, so warm runs fetch only newly-finished matches.
      # Restore + save are split so the cache persists even if a run fails
      # partway (the cold start fetches ~all finished fixtures and can 429).
      - name: Restore fetch cache
        id: fetch-cache
        uses: actions/cache/restore@v4
        with:
          path: data-pipeline/sources
          key: af-sources-v1
          restore-keys: af-sources-

      - name: Refresh warehouse (fetch → build → export)
        working-directory: data-pipeline
        run: |
          npm run build:warehouse
          npm run export

      # Save the (now warmer) fetch cache — always(), so even a partial cold run
      # persists what it managed to fetch and the next run resumes warmer. Rolling
      # key so each run overwrites the newest snapshot.
      - name: Save fetch cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data-pipeline/sources
          key: af-sources-v1-${{ github.run_id }}

      - name: Publish warehouse to Cloudflare D1
        working-directory: data-pipeline
        run: npm run publish:d1

      - name: Commit refreshed JSON exports
        run: |
          git config user.name  "kickabout-bot"
          git config user.email "bot@kickabout.local"
          git add data-pipeline/warehouse/export data-pipeline/warehouse/vote-snapshots.json data-pipeline/warehouse/odds-snapshots.json data-pipeline/warehouse/odds-history.json
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "chore(data): hourly refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./dist --project-name=worldcup-2026-now --branch=main --commit-dirty=true
