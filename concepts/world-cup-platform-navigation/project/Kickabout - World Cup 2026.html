document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  body{background:#f4efe6;color:#16181d;font-family:'Hanken Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}\n  a{color:inherit;text-decoration:none}\n  ::selection{background:#ffd23f}\n  @keyframes kb-rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}\n  @keyframes kb-pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}\n  @keyframes kb-grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}\n  .kb-route{animation:kb-rise .28s ease both}\n  .kb-card-hover{transition:transform .12s ease, box-shadow .12s ease}\n  .kb-card-hover:hover{transform:translateY(-3px)}\n  ::-webkit-scrollbar{height:10px;width:10px}\n  ::-webkit-scrollbar-thumb{background:#d8cfbf;border-radius:10px}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n\n  <sc-if value=\"{{ appReady }}\" hint-placeholder-val=\"{{ false }}\">\n  <header style=\"position:sticky;top:0;z-index:40;background:rgba(244,239,230,.86);backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid #e4dccd\">\n    <div style=\"max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:13px 20px;flex-wrap:wrap\">\n      <a href=\"#/\" style=\"display:flex;align-items:center;gap:9px;font-family:'Archivo';font-weight:900;font-size:20px;letter-spacing:-.5px;flex:none\">\n        <span style=\"width:30px;height:30px;border-radius:9px;background:#16181d;color:#ffd23f;display:flex;align-items:center;justify-content:center;font-size:16px;transform:rotate(-6deg)\">⚽<\u002Fspan>\n        Kick<span style=\"color:#e8482b\">about<\u002Fspan>\n      <\u002Fa>\n      <nav style=\"display:flex;gap:3px;flex:1;flex-wrap:wrap\">\n        <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"5\">\n          <a href=\"{{ n.href }}\" class=\"kb-nav\" style=\"padding:8px 13px;border-radius:10px;font-weight:700;font-size:14px;color:{{ n.color }};background:{{ n.bg }}\">{{ n.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fnav>\n      <form onsubmit=\"{{ onSearchSubmit }}\" style=\"display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #e4dccd;border-radius:11px;padding:8px 12px\">\n        <span style=\"color:#a59a85;font-size:14px\">⌕<\u002Fspan>\n        <input ref=\"{{ searchRef }}\" placeholder=\"Search teams, players…\" style=\"background:none;border:none;outline:none;color:#16181d;width:150px;font-size:14px;font-family:inherit\">\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1080px;width:100%;margin:0 auto;padding:24px 20px 70px;flex:1\">\n\n    <!-- ======================= HOME ======================= -->\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"kb-route\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:6px\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#e8482b\">World Cup 2026 · USA · Canada · Mexico<\u002Fdiv>\n          <div style=\"color:#6f6655;font-size:14px;margin-top:3px\">Pick how you like to follow along.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:4px;background:#fff;border:1px solid #e4dccd;border-radius:12px;padding:4px\">\n          <sc-for list=\"{{ homeTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ t.onClick }}\" style=\"border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13.5px;padding:8px 14px;border-radius:9px;color:{{ t.color }};background:{{ t.bg }}\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DIRECTION A: Stories-first -->\n      <sc-if value=\"{{ isHomeStories }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <a href=\"{{ featured.href }}\" class=\"kb-card-hover\" style=\"display:block;background:{{ featured.heroGrad }};border-radius:22px;padding:34px;color:#fff;margin:14px 0 24px;box-shadow:0 18px 40px -22px rgba(0,0,0,.5);position:relative;overflow:hidden\">\n          <div style=\"display:inline-block;font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;background:rgba(255,255,255,.22);padding:5px 11px;border-radius:999px\">{{ featured.tag }}<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:40px;line-height:1.02;letter-spacing:-1px;margin:16px 0 10px;max-width:760px;text-wrap:balance\">{{ featured.title }}<\u002Fdiv>\n          <div style=\"font-size:17px;opacity:.92;max-width:620px;line-height:1.45\">{{ featured.dek }}<\u002Fdiv>\n          <div style=\"margin-top:18px;font-size:13px;font-weight:600;opacity:.85\">{{ featured.byline }} · Read the story →<\u002Fdiv>\n        <\u002Fa>\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n          <h2 style=\"font-family:'Archivo';font-weight:800;font-size:22px;margin:0\">Latest stories<\u002Fh2>\n          <a href=\"#/stories\" style=\"color:#e8482b;font-weight:700;font-size:14px\">All stories →<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px\">\n          <sc-for list=\"{{ storyCards }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <a href=\"{{ s.href }}\" class=\"kb-card-hover\" style=\"display:flex;flex-direction:column;background:#fff;border:1px solid #e9e1d2;border-radius:16px;overflow:hidden\">\n              <div style=\"height:8px;background:{{ s.heroGrad }}\"><\u002Fdiv>\n              <div style=\"padding:16px 17px 18px;display:flex;flex-direction:column;gap:8px;flex:1\">\n case;letter-spacing:.6px\">{{ m.dateLabel }} · {{ m.stageLabel }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:7px;margin-top:9px\"><span style=\"width:24px;height:17px;border-radius:4px;background:{{ m.home.grad }}\"><\u002Fspan><b style=\"font-size:14px\">{{ m.home.name }}<\u002Fb><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:7px;margin-top:6px\"><span style=\"width:24px;height:17px;border-radius:4px;background:{{ m.away.grad }}\"><\u002Fspan><b style=\"font-size:14px\">{{ m.away.name }}<\u002Fb><\u002Fdiv>\n                <div style=\"margin-top:10px;font-size:12px;font-weight:700;color:#138a5e\">{{ m.favLine }}<\u002Fdiv>\n              <\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DIRECTION B: Today / matchday -->\n      <sc-if value=\"{{ isHomeToday }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin:14px 0 24px\" class=\"kb-home-grid\">\n          <div style=\"background:#16181d;border-radius:20px;padding:26px;color:#fff\">\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:#ffd23f\">Next up · {{ todayMatch.dateLabel }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin:20px 0 6px\">\n              <div style=\"flex:1;text-align:center\">\n                <div style=\"width:62px;height:44px;border-radius:9px;background:{{ todayMatch.home.grad }};margin:0 auto 9px\"><\u002Fdiv>\n                <div style=\"font-family:'Archivo';font-weight:800;font-size:17px\">{{ todayMatch.home.name }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:900;font-size:22px;color:#6f6655\">VS<\u002Fdiv>\n              <div style=\"flex:1;text-align:center\">\n                <div style=\"width:62px;height:44px;border-radius:9px;background:{{ todayMatch.away.grad }};margin:0 auto 9px\"><\u002Fdiv>\n                <div style=\"font-family:'Archivo';font-weight:800;font-size:17px\">{{ todayMatch.away.name }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:center;color:#a59a85;font-size:13px;margin-bottom:18px\">{{ todayMatch.stageLabel }} · {{ todayMatch.where }}<\u002Fdiv>\n            <div style=\"text-align:center;font-family:'Archivo';font-weight:800;font-size:14px;letter-spacing:.5px;margin-bottom:10px\">WHO DO YOU THINK WINS?<\u002Fdiv>\n            <div style=\"display:flex;gap:10px\">\n              <a href=\"{{ todayMatch.href }}\" style=\"flex:1;text-align:center;padding:13px;border-radius:11px;background:{{ todayMatch.home.grad }};font-weight:800;font-family:'Archivo';color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)\">{{ todayMatch.home.code }}<\u002Fa>\n              <a href=\"{{ todayMatch.href }}\" style=\"flex:none;align-self:center;padding:0 6px;color:#6f6655;font-size:12px;font-weight:700\">draw<\u002Fa>\n              <a href=\"{{ todayMatch.href }}\" style=\"flex:1;text-align:center;padding:13px;border-radius:11px;background:{{ todayMatch.away.grad }};font-weight:800;font-family:'Archivo';color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)\">{{ todayMatch.away.code }}<\u002Fa>\n            <\u002Fdiv>\n            <div style=\"text-align:center;margin-top:12px\"><a href=\"{{ todayMatch.href }}\" style=\"color:#ffd23f;font-weight:700;font-size:13px\">Vote &amp; see our prediction →<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"{{ featured.href }}\" class=\"kb-card-hover\" style=\"display:flex;flex-direction:column;justify-content:flex-end;background:{{ featured.heroGrad }};border-radius:20px;padding:22px;color:#fff;min-height:230px\">\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:11px;letter-spacing:1px;t lder-count=\"4\">\n        <h3 style=\"font-family:'Archivo';font-weight:800;font-size:15px;margin:18px 0 9px;color:#6f6655\">{{ g.label }}<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:9px\">\n          <sc-for list=\"{{ g.players }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <a href=\"{{ p.href }}\" style=\"display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #eee6d8;border-radius:11px;padding:9px 12px\">\n              <span style=\"font-family:'Archivo';font-weight:800;font-size:10.5px;color:#fff;background:{{ p.posColor }};padding:3px 7px;border-radius:6px;flex:none\">{{ p.pos }}<\u002Fspan>\n              <span style=\"flex:1;min-width:0\"><b style=\"font-size:13.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fb><span style=\"color:#a59a85;font-size:11.5px\">{{ p.metaLine }}<\u002Fspan><\u002Fspan>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ======================= POWER RANKING ======================= -->\n    <sc-if value=\"{{ isPower }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"kb-route\">\n      <h1 style=\"font-family:'Archivo';font-weight:900;font-size:34px;letter-spacing:-1px;margin:4px 0 2px\">Power ranking<\u002Fh1>\n      <p style=\"color:#6f6655;font-size:15px;margin:0 0 6px;max-width:620px\">All 48 teams, strongest first. Our <b>power score<\u002Fb> blends each team's rating, world ranking, how they've played here and squad firepower — higher is stronger.<\u002Fp>\n      <a href=\"#/teams\" style=\"color:#e8482b;font-weight:700;font-size:13.5px\">Browse teams →<\u002Fa>\n      <div style=\"background:#fff;border:1px solid #e9e1d2;border-radius:16px;overflow:hidden;margin-top:16px\">\n        <sc-for list=\"{{ powerList }}\" as=\"t\" hint-placeholder-count=\"12\">\n          <a href=\"{{ t.href }}\" style=\"display:flex;align-items:center;gap:13px;padding:11px 16px;border-bottom:1px solid #f1ebdf\">\n            <span style=\"font-family:'Archivo';font-weight:900;font-size:16px;color:#b3a890;width:26px;text-align:center\">{{ t.rankLabel }}<\u002Fspan>\n            <span style=\"width:34px;height:24px;border-radius:5px;background:{{ t.grad }};flex:none\"><\u002Fspan>\n            <span style=\"flex:1;min-width:0\"><b style=\"font-size:15px\">{{ t.name }}<\u002Fb><span style=\"color:#a59a85;font-size:12px;margin-left:8px\">{{ t.statusLabel }}<\u002Fspan><\u002Fspan>\n            <span style=\"flex:none;width:120px\"><span style=\"display:block;height:8px;border-radius:5px;background:#f0e9db;overflow:hidden\"><span style=\"display:block;height:100%;width:{{ t.strength }}%;background:linear-gradient(90deg,#e8482b,#ffd23f)\"><\u002Fspan><\u002Fspan><\u002Fspan>\n            <span style=\"font-family:'Archivo';font-weight:900;font-size:18px;color:#16181d;width:38px;text-align:right\">{{ t.strength }}<\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ======================= BRACKET / GROUPS ======================= -->\n    <sc-if value=\"{{ isBracket }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"kb-route\">\n      <h1 style=\"font-family:'Archivo';font-weight:900;font-size:34px;letter-spacing:-1px;margin:4px 0 2px\">Bracket &amp; groups<\u002Fh1>\n      <p style=\"color:#6f6655;font-size:15px;margin:0 0 18px;max-width:620px\">Four knockout ties are locked. The rest slot in as the last groups finish and the eight best third-placed teams are settled.<\u002Fp>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:20px;margin:0 0 12px\">The road to the final<\u002Fh2>\n      <div style=\"display:flex;gap:22px;overflow-x:auto;padding-bottom:14px\">\n        <sc-for list=\"{{ bracketCols }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <div style=\"min-width:215px;flex:none\">\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:#a59a85;margin-bottom:10px\">{{ c.title }}<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ c.ties }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <a href=\"{{ t.href }}\" class=\"kb-card-hover\" style=\"display:block;background:{{ t.bg }};border:1px solid #e9e1d2;border-radius:12px;padding:11px 13px;cursor:{{ t.cursor }}\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\"><span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:24px;height:17px;border-radius:4px;background:{{ t.home.grad }}\"><\u002Fspan><b style=\"font-size:13.5px;color:{{ t.textColor }}\">{{ t.home.code }}<\u002Fb><\u002Fspan><span style=\"font-size:11px;color:#a59a85\">{{ t.dateLabel }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:7px;margin-top:7px\"><span style=\"width:24px;height:17px;border-radius:4px;background:{{ t.away.grad }}\"><\u002Fspan><b style=\"font-size:13.5px;color:{{ t.textColor }}\">{{ t.away.code }}<\u002Fb><\u002Fdiv>\n                <\u002Fa>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo';font-weight:800;font-size:20px;margin:26px 0 12px\">Groups<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px\">\n        <sc-for list=\"{{ groupsVM }}\" as=\"g\" hint-placeholder-count=\"12\">\n          <div style=\"background:#fff;border:1px solid #e9e1d2;border-radius:15px;padding:14px 16px\">\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:15px;margin-bottom:9px\">{{ g.name }}<\u002Fdiv>\n            <sc-for list=\"{{ g.rows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <a href=\"{{ r.href }}\" style=\"display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid #f4eee1\">\n                <span style=\"width:24px;height:17px;border-radius:4px;background:{{ r.grad }};flex:none\"><\u002Fspan>\n                <b style=\"flex:1;font-size:13.5px;color:{{ r.nameColor }}\">{{ r.code }}<\u002Fb>\n                <span style=\"font-size:12px;color:#a59a85;font-variant-numeric:tabular-nums\">{{ r.ptsLabel }}<\u002Fspan>\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ r.dot }};flex:none\"><\u002Fspan>\n              <\u002Fa>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ======================= PLAYERS ======================= -->\n    <sc-if value=\"{{ isPlayers }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"kb-route\">\n      <h1 style=\"font-family:'Archivo';font-weight:900;font-size:34px;letter-spacing:-1px;margin:4px 0 2px\">Players<\u002Fh1>\n      <p style=\"color:#6f6655;font-size:15px;margin:0 0 16px\">{{ playerTotal }} players across every squad. The biggest names, by international goals.<\u002Fp>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px\">\n        <select onchange=\"{{ onPosChange }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;padding:9px 13px;border-radius:11px;border:1px solid #e4dccd;background:#fff\">\n          <sc-for list=\"{{ posOptions }}\" as=\"o\" hint-placeholder-count=\"5\"><option value=\"{{ o.id }}\" selected=\"{{ o.selected }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n        <select onchange=\"{{ onSortChange }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;padding:9px 13px;border-radius:11px;border:1px solid #e4dccd;background:#fff\">\n          <sc-for list=\"{{ sortOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{ o.id }}\" selected=\"{{ o.selected }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px\">\n        <sc-for list=\"{{ playerList }}\" as=\"p\" hint-placeholder-count=\"12\">\n          <a href=\"{{ p.href }}\" class=\"kb-card-hover\" style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e9e1d2;border-radius:13px;padding:11px 14px\">\n            <span style=\"width:30px;height:21px;border-radius:4px;background:{{ p.teamGrad }};flex:none\"><\u002Fspan>\n            <div style=\"flex:1;min-width:0\"><b style=\"font-size:14.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fb><div style=\"color:#a59a85;font-size:12px\">{{ p.metaLine }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"text-align:right;flex:none\"><div style=\"font-family:'Archivo';font-weight:900;font-size:15px;color:#e8482b\">{{ p.statValue }}<\u002Fdiv><div style=\"color:#a59a85;font-size:10.5px\">{{ p.statLabel }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ======================= PLAYER DETAIL ======================= -->\n    <sc-if value=\"{{ isPlayer }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"kb-route\">\n      <sc-if value=\"{{ playerVM.ok }}\" hint-placeholder-val=\"{{ true }}\">\n      <a onclick=\"{{ goBack }}\" style=\"cursor:pointer;color:#a59a85;font-weight:700;font-size:13.5px\">← Back<\u002Fa>\n      <div style=\"display:flex;align-items:center;gap:18px;margin-top:16px\">\n        <div style=\"width:72px;height:72px;border-radius:50%;background:{{ playerVM.posColor }};color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:900;font-size:24px;flex:none\">{{ playerVM.initials }}<\u002Fdiv>\n        <div>\n          <h1 style=\"font-family:'Archivo';font-weight:900;font-size:32px;letter-spacing:-.8px;margin:0\">{{ playerVM.name }}<\u002Fh1>\n          <div style=\"color:#6f6655;font-size:14.5px;margin-top:3px\">{{ playerVM.posName }} · <a href=\"{{ playerVM.teamHref }}\" style=\"color:#e8482b;font-weight:700\">{{ playerVM.teamName }}<\u002Fa> · {{ playerVM.club }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:20px\">\n        <sc-for list=\"{{ playerVM.kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid #e9e1d2;border-radius:14px;padding:16px\"><div style=\"font-family:'Archivo';font-weight:900;font-size:28px;letter-spacing:-.5px\">{{ k.value }}<\u002Fdiv><div style=\"color:#6f6655;font-size:12.5px;font-weight:600;margin-top:1px\">{{ k.label }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;background:#fff;border:1px solid #e9e1d2;border-left:4px solid #ffd23f;border-radius:12px;padding:15px 18px;color:#6f6655;font-size:14px\">Live tournament stats — minutes, goals this World Cup, match ratings — would stream in from a live data feed. These figures are career international totals.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ======================= SEARCH ======================= -->\n    <sc-if value=\"{{ isSearch }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"kb-route\">\n      <h1 style=\"font-family:'Archivo';font-weight:900;font-size:30px;letter-spacing:-.8px;margin:4px 0 16px\">{{ searchHeading }}<\u002Fh1>\n      <sc-if value=\"{{ search.hasTeams }}\" hint-placeholder-val=\"{{ false }}\">\n        <h2 style=\"font-family:'Archivo';font-weight:800;font-size:18px;margin:0 0 11px\">Teams<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:11px;margin-bottom:22px\">\n          <sc-for list=\"{{ search.teams }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <a href=\"{{ t.href }}\" class=\"kb-card-hover\" style=\"display:flex;align-items:center;gap:9px;background:#fff;border:1px solid #e9e1d2;border-radius:12px;padding:12px 14px\"><span style=\"width:30px;height:21px;border-radius:4px;background:{{ t.grad }}\"><\u002Fspan><b>{{ t.name }}<\u002Fb><\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ search.hasPlayers }}\" hint-placeholder-val=\"{{ false }}\">\n        <h2 style=\"font-family:'Archivo';font-weight:800;font-size:18px;margin:0 0 11px\">Players<\u002Fh2>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px\">\n          <sc-for list=\"{{ search.players }}\" as=\"p\" hint-placeholder-count=\"6\">\n            <a href=\"{{ p.href }}\" class=\"kb-card-hover\" style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e9e1d2;border-radius:13px;padding:11px 14px\">\n              <span style=\"width:30px;height:21px;border-radius:4px;background:{{ p.teamGrad }};flex:none\"><\u002Fspan>\n              <div style=\"flex:1;min-width:0\"><b style=\"font-size:14.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fb><div style=\"color:#a59a85;font-size:12px\">{{ p.metaLine }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ search.empty }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"color:#a59a85;font-weight:600\">No matches. Try a team or player name.<\u002Fp>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isNotFound }}\" hint-placeholder-val=\"{{ false }}\">\n      <h1 style=\"font-family:'Archivo';font-weight:900;font-size:30px\">Page not found<\u002Fh1>\n      <a href=\"#/\" style=\"color:#e8482b;font-weight:700\">← Home<\u002Fa>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer style=\"border-top:1px solid #e4dccd;padding:24px 20px;text-align:center;color:#a59a85;font-size:12.5px;line-height:1.6\">\n    <b style=\"color:#6f6655\">Kickabout<\u002Fb> · Squads, standings, fixtures and ratings are real, current to late June 2026.<br>\n    Our forecast is a transparent model (team rating + form + squad + home advantage), not betting advice. Stories are editorial.\n  <\u002Ffooter>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:14px;color:#a59a85\">\n      <div style=\"width:46px;height:46px;border-radius:13px;background:#16181d;color:#ffd23f;display:flex;align-items:center;justify-content:center;font-size:24px;animation:kb-pop .5s ease both\">⚽<\u002Fdiv>\n      <div style=\"font-family:'Archivo';font-weight:800;font-size:15px;letter-spacing:.5px\">Warming up the pitch…<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { ready:false, seg:'', id:null, params:{}, homeView:'stories', votes:{}, sf:'all', tick:0 };\n\n  componentDidMount(){\n    try{ this.setState({ homeView: localStorage.getItem('kb_home') || 'stories', votes: JSON.parse(localStorage.getItem('kb_votes')||'{}') }); }catch(e){}\n    this._onHash = ()=> this.parseHash();\n    window.addEventListener('hashchange', this._onHash);\n    this.parseHash();\n    Promise.resolve(window.KB_DATA).then(d=>{ this.DB = this.build(d); this.setState({ready:true}); })\n      .catch(err=>{ console.error('data load failed', err); });\n  }\n  componentWillUnmount(){ window.removeEventListener('hashchange', this._onHash); }\n\n  // ---------- routing ----------\n  parseHash(){\n    const raw = (location.hash||'').replace(/^#\\/?/, '');\n    const [path, qs] = raw.split('?');\n    const parts = path.split('/');\n    const params = {};\n    if(qs) qs.split('&').forEach(kv=>{ const [k,v]=kv.split('='); params[k]=decodeURIComponent(v||''); });\n    this.setState({ seg: parts[0]||'', id: parts[1]||null, params });\n    if(typeof window!=='undefined') window.scrollTo(0,0);\n  }\n  goBack = ()=>{ if(history.length>1) history.back(); else location.hash='#/'; };\n\n  // ---------- helpers ----------\n  slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }\n  expScore(d){ return 1/(1+Math.pow(10,-d/400)); }\n  predict(a,b){\n    const d=a.adjRating-b.adjRating, E=this.expScore(d);\n    let draw=0.28*Math.exp(-Math.abs(d)/220);\n    let win=E-draw/2, lose=1-win-draw;\n    if(win<0.01)win=0.01; if(lose<0.01)lose=0.01;\n    const s=win+draw+lose;\n    return { win:win/s, draw:draw/s, lose:lose/s, d };\n  }\n  pct(x){ return Math.round(x*100); }\n  initials(n){ return (n||'').split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }\n  dateLabel(iso){ if(!iso) return ''; const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const d=iso.slice(0,10).split('-'); if(d.length<3) return iso; return (+d[2])+' '+M[(+d[1])-1]; }\n\n  // ---------- build the database ----------\n  build(D){\n    const COACHES={}, SQUADS={};\n    D.SQUADS_RAW.forEach(([team,coach,players])=>{\n      const id=this.slug(team); COACHES[id]=coach;\n      SQUADS[id]=players.map((p,i)=>({ id:id+'-'+i, teamId:id, pos:p[0], name:p[1], age:p[2], caps:p[3], goals:p[4], club:p[5] }));\n    });\n    const HOSTS=['united-states','canada','mexico'];\n    const aggMap={}, _gl=[];\n    Object.keys(SQUADS).forEach(id=>{ const sq=SQUADS[id]; const caps=sq.reduce((s,p)=>s+p.caps,0), goals=sq.reduce((s,p)=>s+p.goals,0); aggMap[id]={caps,goals}; _gl.push(goals); });\n    const avg=_gl.reduce((s,x)=>s+x,0)/_gl.length;\n    const sd=Math.sqrt(_gl.reduce((s,x)=>s+(x-avg)**2,0)/_gl.length)||1;\n\n    const teams=[], byId={}, byName={};\n    const POSCOLOR={GK:'#f4b400',DF:'#2a6fdb',MF:'#138a5e',FW:'#e8482b'};\n    const groups=Object.keys(D.GROUPS).map(letter=>{\n      const standings=D.GROUPS[letter].map((row,i)=>{\n        const [name,code,conf,pts,gd,status]=row, id=this.slug(name);\n        const [elo,fifaRank]=D.RATINGS[id]||[1600,99];\n        const agg=aggMap[id]||{caps:0,goals:0};\n        const formAdj=Math.round(Math.max(-35,Math.min(35,(pts-4.5)*5+gd*2)));\n        const squadAdj=Math.round(Math.max(-20,Math.min(20,((agg.goals-avg)/sd)*10)));\n        const hostAdj=HOSTS.includes(id)?40:0;\n        const adjRating=elo+formAdj+squadAdj+hostAdj;\n        const cols=D.TEAM_COLORS[id]||['#555','#999'];\n        const through=['winner','runner_up','best_third'].includes(status);\n        const statusLabel = status==='winner'?'Through · 1st': status==='runner_up'?'Through · 2nd': status==='best_third'?'Through · 3rd': status==='eliminated'?'Eliminated':'Still alive';\n        const statusKind = through?'in': status==='eliminated'?'out':'live';\n        const t={ id,name,shortCode:code,confederation:conf,groupLetter:letter,\n          points:pts,goalDifference:gd,status, elo,fifaRank, formAdj,squadAdj,hostAdj,adjRating,\n          c1:cols[0],c2:cols[1], grad:`linear-gradient(135deg,${cols[0]} 0%,${cols[0]} 48%,${cols[1]} 52%,${cols[1]} 100%)`,\n          statusLabel, statusKind, qualified:through, coach:COACHES[id]||'—' };\n        teams.push(t); byId[id]=t; byName[name]=t;\n        return { teamId:id, rank:i+1, points:pts, goalDifference:gd, status };\n      });\n      return { id:'group-'+letter.toLowerCase(), name:'Group '+letter, letter, standings };\n    });\n    const ar=teams.map(t=>t.adjRating), mn=Math.min(...ar), mx=Math.max(...ar);\n    teams.forEach(t=>t.strength=Math.round(((t.adjRating-mn)/(mx-mn))*100));\n\n    const matches=[]; const groupMatches=[];\n    D.REAL_RESULTS.forEach((row,i)=>{\n      const [g,hn,an,hs,as]=row, h=byName[hn], a=byName[an]; if(!h||!a) return;\n      const m={ id:'gm-'+i, stage:'group', kickoff:'2026-06', status:'finished', homeTeamId:h.id, awayTeamId:a.id, homeScore:hs, awayScore:as, where:'Group stage' };\n      matches.push(m); groupMatches.push(m);\n    });\n    const r32=D.REAL_R32.map((row,i)=>{\n      const [hn,an,date,venue,city]=row, h=byName[hn], a=byName[an];\n      return { id:'r32-'+i, stage:'r32', kickoff:date+'T15:00', status:'scheduled', homeTeamId:h.id, awayTeamId:a.id, homeScore:null, awayScore:null, venue, city, where:[city,venue].filter(Boolean).join(' · ') };\n    });\n    matches.push(...r32);\n    const matchById={}; matches.forEach(m=>matchById[m.id]=m);\n\n    // resolve story matchKeys -> match ids\n    const storyByMatch={};\n    const stories=D.STORIES.map(s=>{\n      let matchId=null;\n      if(s.matchKey){\n        const [type, sl]=s.matchKey.split('|');\n        if(type==='r32') { const m=r32.find(x=>x.homeTeamId===sl); matchId=m&&m.id; }\n        else if(type==='group'){ const m=groupMatches.filter(x=>x.homeTeamId===sl)[0]; matchId=m&&m.id; }\n        else if(type==='group2'){ const m=groupMatches.filter(x=>x.homeTeamId===sl)[1]; matchId=m&&m.id; }\n      }\n      if(matchId) storyByMatch[matchId]=s.id;\n      return { ...s, matchId };\n    });\n    const storyById={}; stories.forEach(s=>storyById[s.id]=s);\n\n    return { teams, byId, byName, groups, matches, matchById, r32, groupMatches, SQUADS, COACHES,\n      allPlayers:Object.values(SQUADS).flat(), stories, storyById, storyByMatch, POSCOLOR,\n      ACCENT:{preview:'#138a5e', recap:'#e8482b', feature:'#2a6fdb'},\n      HEROGRAD:{preview:'linear-gradient(135deg,#0f7a52,#1aa86c)', recap:'linear-gradient(135deg,#c43417,#e8482b)', feature:'linear-gradient(135deg,#1c2b52,#2a6fdb)'} };\n  }\n\n  // ---------- view-model helpers ----------\n  chip(t){ return t ? { id:t.id, name:t.name, code:t.shortCode, grad:t.grad, href:'#/team/'+t.id } : { name:'TBD', code:'TBD', grad:'#d8cfbf', href:'#' }; }\n  POSNAME={GK:'Goalkeeper',DF:'Defender',MF:'Midfielder',FW:'Forward'};\n\n  matchCard(m){\n    const h=this.DB.byId[m.homeTeamId], a=this.DB.byId[m.awayTeamId];\n    const pr=this.predict(h,a);\n    const fav = pr.win>=pr.lose ? h : a, favp=Math.max(pr.win,pr.lose);\n    return { id:m.id, href:'#/match/'+m.id, home:this.chip(h), away:this.chip(a),\n      dateLabel:m.stage==='group'?'Group stage':this.dateLabel(m.kickoff), stageLabel:m.stage==='group'?'Group':'Round of 32',\n      where:m.where||'', finished:m.status==='finished', scoreLabel:m.status==='finished'?(m.homeScore+' – '+m.awayScore):'vs',\n      centerLabel:m.status==='finished'?(m.homeScore+' – '+m.awayScore):'vs',\n      homePct:this.pct(pr.win), drawPct:this.pct(pr.draw), awayPct:this.pct(pr.lose),\n      favLine: fav.name+' favoured · '+this.pct(favp)+'%' };\n  }\n\n  // the rich showdown object consumed by ShowdownPanel child DC\n  showdownVM(m){\n    if(!m) return { ok:false, same:false };\n    const h=this.DB.byId[m.homeTeamId], a=this.DB.byId[m.awayTeamId];\n    if(!h||!a||h.id===a.id) return { ok:false, same:true };\n    const pr=this.predict(h,a);\n    const mh = pr.win/(pr.win+pr.lose);\n    let fanHome = Math.round(50 + (mh*100-50)*0.72);\n    const vote = this.state.votes[m.id]||null;\n    if(vote==='home') fanHome=Math.min(94,fanHome+3); else if(vote==='away') fanHome=Math.max(6,fanHome-3);\n    fanHome=Math.max(6,Math.min(94,fanHome));\n    const modelPick = pr.win>=pr.lose ? 'home':'away';\n    const sign=v=>(v>0?'+':'')+v;\n    const _pc=this.DB.POSCOLOR; const stars=(tid)=>(this.DB.SQUADS[tid]||[]).slice().sort((x,y)=>y.goals-x.goals).slice(0,3).map(p=>({href:'#/player/'+p.id,name:p.name,pos:p.pos,posColor:_pc[p.pos],club:p.club,goals:p.goals}));\n    return {\n      homeStars: stars(h.id), awayStars: stars(a.id),\n      ok:true, same:false, matchId:m.id,\n      home:this.chip(h), away:this.chip(a),\n      homeBorder: vote==='home'?'#ffd23f':'rgba(255,255,255,.15)', awayBorder: vote==='away'?'#ffd23f':'rgba(255,255,255,.15)',\n      homeVoteLabel: vote==='home'?'\\u2713 your pick':'tap to pick', awayVoteLabel: vote==='away'?'\\u2713 your pick':'tap to pick',\n      notVoted: !vote,\n      homePct:this.pct(pr.win), drawPct:this.pct(pr.draw), awayPct:this.pct(pr.lose),\n      favName: (pr.win>=pr.lose?h:a).name, favPct: Math.max(this.pct(pr.win),this.pct(pr.lose)),\n      favSentence: (pr.win>=pr.lose?h:a).name+' have about a '+Math.max(this.pct(pr.win),this.pct(pr.lose))+'% chance of winning in 90 minutes.',\n      agreeLine: vote ? (vote===modelPick ? 'Nice \\u2014 you and the model agree.' : 'You went the other way. Bold!') : '',\n      factors:[\n        { label:'Team rating', sub:'Elo — rises by beating strong teams', h:String(h.elo), a:String(a.elo), hWin:h.elo>=a.elo },\n        { label:'World ranking', sub:'Official FIFA rank', h:'#'+h.fifaRank, a:'#'+a.fifaRank, hWin:h.fifaRank<=a.fifaRank },\n        { label:'Form so far', sub:'How they\\'ve played this tournament', h:sign(h.formAdj), a:sign(a.formAdj), hWin:h.formAdj>=a.formAdj },\n        { label:'Squad firepower', sub:'Goals in the squad vs the field', h:sign(h.squadAdj), a:sign(a.squadAdj), hWin:h.squadAdj>=a.squadAdj },\n        { label:'Home boost', sub:'Edge for the three host nations', h:sign(h.hostAdj), a:sign(a.hostAdj), hWin:h.hostAdj>=a.hostAdj },\n        { label:'Our rating', sub:'Everything above, combined', h:String(h.adjRating), a:String(a.adjRating), hWin:h.adjRating>=a.adjRating }\n      ].map(f=>({...f,hColor:f.hWin?'#0d6b46':'#b3a890',aColor:f.hWin?'#b3a890':'#0d6b46'})),\n      vote, voted: !!vote, fanHomePct:fanHome, fanAwayPct:100-fanHome,\n      modelPick, modelPickName: modelPick==='home'?h.name:a.name,\n      agree: vote===modelPick,\n      onVoteHome: ()=>this.vote(m.id,'home'),\n      onVoteAway: ()=>this.vote(m.id,'away'),\n      explain:\"We start from each team's Elo rating, then nudge it for how they've played here, how dangerous the squad is in front of goal, and a home boost for the three hosts. The draw chance shrinks as the gap between two teams grows.\"\n    };\n  }\n  vote(matchId, side){\n    const votes={ ...this.state.votes, [matchId]:side };\n    try{ localStorage.setItem('kb_votes', JSON.stringify(votes)); }catch(e){}\n    this.setState({ votes });\n  }\n\n  setHome(v){ try{ localStorage.setItem('kb_home', v); }catch(e){} this.setState({ homeView:v }); }\n  go(hash){ location.hash=hash; }\n\n  renderVals(){\n    if(!this.state.ready || !this.DB) return { loading:true, appReady:false };\n    const { seg, id, params } = this.state;\n    const DB=this.DB;\n    const navKeyFor = (s)=> s===''?'' : (['matches','match','predict'].includes(s)?'matches' : (['stories','story'].includes(s)?'stories' : (['teams','team','players','player'].includes(s)?'teams' : (['bracket','power'].includes(s)?'bracket':''))));\n    const ak=navKeyFor(seg);\n    const NAV=[['','Today'],['matches','Matches'],['stories','Stories'],['teams','Teams'],['bracket','Bracket']];\n    const navItems=NAV.map(([key,label])=>({ href:'#/'+key, label,\n      color: key===ak?'#fff':'#16181d', bg: key===ak?'#16181d':'transparent' }));\n\n    const out = {\n      loading:false, appReady:true, navItems,\n      searchRef: (this._searchRef = this._searchRef || React.createRef()),\n      onSearchSubmit: (e)=>{ e.preventDefault(); const v=this._searchRef.current?this._searchRef.current.value:''; if(v.trim()) location.hash='#/search?q='+encodeURIComponent(v.trim()); },\n      goBack:this.goBack,\n      isHome:false,isStories:false,isStory:false,isMatches:false,isPredict:false,isMatch:false,\n      isTeams:false,isTeam:false,isPower:false,isBracket:false,isPlayers:false,isPlayer:false,isSearch:false,isNotFound:false\n    };\n\n    const storyCard = (s)=>{\n      const a=DB.byId[s.teamA], b=DB.byId[s.teamB];\n      return { id:s.id, href:'#/story/'+s.id, title:s.title, dek:s.dek, dateLabel:this.dateLabel(s.date), read:s.read,\n        kindLabel: s.kind==='preview'?'Preview':s.kind==='recap'?'Match report':'The big picture',\n        accent:DB.ACCENT[s.kind], heroGrad:DB.HEROGRAD[s.kind],\n        aGrad:a?a.grad:'#d8cfbf', bGrad:b?b.grad:'#d8cfbf',\n        matchup: (a?a.shortCode:'') + (b?(' vs '+b.shortCode):'') };\n    };\n\n    // ===================== HOME =====================\n    if(seg===''){\n      out.isHome=true;\n      const hv=this.state.homeView;\n      out.isHomeStories = hv==='stories'; out.isHomeToday = hv==='today'; out.isHomePulse = hv==='pulse';\n      out.homeTabs=[['stories','Stories'],['today','Today'],['pulse','Tournament']].map(([k,l])=>({\n        label:l, onClick:()=>this.setHome(k), color: hv===k?'#fff':'#6f6655', bg: hv===k?'#e8482b':'transparent' }));\n\n      const feat=DB.stories[0]; const fa=DB.byId[feat.teamA], fb=DB.byId[feat.teamB];\n      out.featured={ href:'#/story/'+feat.id, title:feat.title, dek:feat.dek, tag:feat.tag, read:feat.read,\n        byline:'By '+feat.author, heroGrad:DB.HEROGRAD[feat.kind], heroGrad2:'linear-gradient(135deg,rgba(0,0,0,.18),rgba(0,0,0,.32))',\n        aGrad:fa?fa.grad:'#ccc', bGrad:fb?fb.grad:'#ccc' };\n\n      out.storyCards = DB.stories.slice(1,5).map(storyCard);\n      out.storyCardsShort = DB.stories.slice(1,4).map(storyCard);\n      out.nextMatches = DB.r32.map(m=>this.matchCard(m));\n      out.recentResults = DB.groupMatches.slice().reverse().slice(0,5).map(m=>this.matchCard(m));\n      const sorted=DB.teams.slice().sort((x,y)=>y.adjRating-x.adjRating);\n      out.contenders = sorted.slice(0,6).map(t=>({ name:t.name, grad:t.grad, strength:t.strength, fifaRank:t.fifaRank, href:'#/team/'+t.id }));\n      out.powerTop = sorted.slice(0,8).map((t,i)=>({ name:t.name, grad:t.grad, strength:t.strength, rankLabel:String(i+1), href:'#/team/'+t.id }));\n      // today's headline match = first r32\n      out.todayMatch = (()=>{ const c=this.matchCard(DB.r32[0]); c.where=DB.r32[0].where; return c; })();\n      const through=DB.teams.filter(t=>t.qualified).length;\n      out.pulseStats=[\n        { value:'48', label:'Teams · 12 groups', color:'#e8482b' },\n        { value:String(through), label:'Through to knockouts', color:'#138a5e' },\n        { value:'4', label:'R32 ties confirmed', color:'#2a6fdb' },\n        { value:'Jul 19', label:'Final · MetLife Stadium', color:'#16181d' }\n      ];\n      return out;\n    }\n\n    // ===================== STORIES =====================\n    if(seg==='stories'){\n      out.isStories=true;\n      const sf=this.state.sf;\n      const feat=DB.stories[0]; const fa=DB.byId[feat.teamA], fb=DB.byId[feat.teamB];\n      out.featured={ href:'#/story/'+feat.id, title:feat.title, dek:feat.dek, tag:feat.tag, read:feat.read, byline:'By '+feat.author,\n        heroGrad:DB.HEROGRAD[feat.kind], heroGrad2:'linear-gradient(135deg,rgba(0,0,0,.16),rgba(0,0,0,.34))',\n        aGrad:fa?fa.grad:'#ccc', bGrad:fb?fb.grad:'#ccc' };\n      out.storyFilters=[['all','All'],['preview','Previews'],['recap','Match reports']].map(([k,l])=>({\n        label:l, onClick:()=>this.setState({sf:k}),\n        color: sf===k?'#fff':'#6f6655', bg: sf===k?'#16181d':'#fff', border: sf===k?'#16181d':'#e4dccd' }));\n      let list=DB.stories.slice(1);\n      if(sf!=='all') list=list.filter(s=>s.kind===sf);\n      out.storyList=list.map(storyCard);\n      return out;\n    }\n\n    // ===================== STORY DETAIL =====================\n    if(seg==='story'){\n      out.isStory=true;\n      const s=DB.storyById[id];\n      if(!s){ out.story={ ok:false, missing:true }; return out; }\n      const a=DB.byId[s.teamA], b=DB.byId[s.teamB];\n      const m=s.matchId?DB.matchById[s.matchId]:null;\n      out.story={ ok:true, missing:false, title:s.title, dek:s.dek, body:s.body, read:s.read,\n        dateLabel:this.dateLabel(s.date), byline:'By '+s.author,\n        kindLabel: s.kind==='preview'?'Round of 32 · Preview':s.kind==='recap'?'Match report':'The big picture',\n        accent:DB.ACCENT[s.kind], heroGrad:DB.HEROGRAD[s.kind],\n        aName:a?a.name:'', bName:b?b.name:'', aGrad:a?a.grad:'#ccc', bGrad:b?b.grad:'#ccc',\n        midLabel: s.score?s.score:'vs',\n        hasMatch:!!m, matchHref: m?'#/match/'+m.id:'#',\n        matchCta: m?(s.kind==='recap'?'See the match':'Open match & vote'):'' };\n      return out;\n    }\n\n    // ===================== MATCHES =====================\n    if(seg==='matches'){\n      out.isMatches=true;\n      out.nextMatches=DB.r32.map(m=>this.matchCard(m));\n      out.recentResults=DB.groupMatches.slice().reverse().map(m=>this.matchCard(m));\n      return out;\n    }\n\n    // ===================== PREDICT =====================\n    if(seg==='predict'){\n      out.isPredict=true;\n      const teams=DB.teams.slice().sort((x,y)=>x.name.localeCompare(y.name));\n      const aId=(DB.byId[params.a]&&params.a)||'spain';\n      const bId=(DB.byId[params.b]&&params.b)||'brazil';\n      out.teamOptionsA=teams.map(t=>({ id:t.id, name:t.name, selected:t.id===aId }));\n      out.teamOptionsB=teams.map(t=>({ id:t.id, name:t.name, selected:t.id===bId }));\n      out.onPredA=(e)=>{ location.hash='#/predict?a='+e.target.value+'&b='+bId; };\n      out.onPredB=(e)=>{ location.hash='#/predict?a='+aId+'&b='+e.target.value; };\n      out.showdown=this.showdownVM({ id:'predict-'+aId+'-'+bId, homeTeamId:aId, awayTeamId:bId });\n      return out;\n    }\n\n    // ===================== MATCH DETAIL =====================\n    if(seg==='match'){\n      out.isMatch=true;\n      const m=DB.matchById[id];\n      if(!m){ out.matchVM={ ok:false }; out.showdown={ok:false}; return out; }\n      const h=DB.byId[m.homeTeamId], a=DB.byId[m.awayTeamId];\n      const fin=m.status==='finished';\n      const sid=DB.storyByMatch[m.id]; const st=sid?DB.storyById[sid]:null;\n      out.matchVM={ ok:true, home:this.chip(h), away:this.chip(a),\n        stageLabel:m.stage==='group'?'Group stage':'Round of 32', where:m.where||'',\n        dateSuffix: (m.kickoff&&m.kickoff.length>7)?(' · '+this.dateLabel(m.kickoff)):'',\n        finished:fin, upcoming:!fin, centerLabel: fin?(m.homeScore+' – '+m.awayScore):'VS',\n        ftLine: fin?(h.name+' '+m.homeScore+'–'+m.awayScore+' '+a.name):'',\n        hasStory:!!st, storyHref: st?'#/story/'+st.id:'#', storyTitle: st?st.title:'', storyGrad: st?DB.HEROGRAD[st.kind]:'#999' };\n      out.showdown = fin ? {ok:false} : this.showdownVM(m);\n      return out;\n    }\n\n    // ===================== TEAMS =====================\n    if(seg==='teams'){\n      out.isTeams=true;\n      const conf=params.conf||'all', group=params.group||'all';\n      let teams=DB.teams.slice();\n      if(conf!=='all') teams=teams.filter(t=>t.confederation===conf);\n      if(group!=='all') teams=teams.filter(t=>t.groupLetter===group);\n      teams.sort((a,b)=>a.name.localeCompare(b.name));\n      const confs=[...new Set(DB.teams.map(t=>t.confederation))].sort();\n      const grps=[...new Set(DB.teams.map(t=>t.groupLetter))].sort();\n      const SB={in:['#0d6b46','rgba(19,138,94,.14)'],out:['#b23a2a','rgba(232,72,43,.13)'],live:['#9a6b00','rgba(244,180,0,.18)']};\n      out.confOptions=[{id:'all',label:'All confederations',selected:conf==='all'}].concat(confs.map(c=>({id:c,label:c,selected:c===conf})));\n      out.groupOptions=[{id:'all',label:'All groups',selected:group==='all'}].concat(grps.map(g=>({id:g,label:'Group '+g,selected:g===group})));\n      out.onConfChange=(e)=>{ location.hash='#/teams?conf='+e.target.value+'&group='+group; };\n      out.onGroupChange=(e)=>{ location.hash='#/teams?conf='+conf+'&group='+e.target.value; };\n      out.teamCount=teams.length;\n      out.teamsList=teams.map(t=>({ name:t.name, grad:t.grad, groupLetter:t.groupLetter, confederation:t.confederation,\n        statusLabel:t.statusLabel, statusColor:SB[t.statusKind][0], statusBg:SB[t.statusKind][1], href:'#/team/'+t.id }));\n      return out;\n    }\n\n    // ===================== TEAM DETAIL =====================\n    if(seg==='team'){\n      out.isTeam=true;\n      const t=DB.byId[id];\n      if(!t){ out.teamVM={ ok:false }; return out; }\n      const sq=DB.SQUADS[id]||[];\n      const matches=DB.matches.filter(m=>m.homeTeamId===id||m.awayTeamId===id);\n      const stars=sq.slice().sort((a,b)=>b.goals-a.goals).slice(0,3).map(p=>({\n        href:'#/player/'+p.id, name:p.name, initials:this.initials(p.name), posName:this.POSNAME[p.pos], posColor:DB.POSCOLOR[p.pos], club:p.club, goals:p.goals }));\n      const posOrder=[['Goalkeepers','GK'],['Defenders','DF'],['Midfielders','MF'],['Forwards','FW']];\n      const posGroups=posOrder.map(([label,pos])=>({ label, players: sq.filter(p=>p.pos===pos).map(p=>({\n        href:'#/player/'+p.id, name:p.name, pos:p.pos, posColor:DB.POSCOLOR[p.pos], metaLine:'Age '+p.age+' · '+p.caps+' caps · '+p.goals+' goals · '+p.club })) })).filter(g=>g.players.length);\n      out.teamVM={ ok:true, name:t.name, grad:t.grad, groupLetter:t.groupLetter, confederation:t.confederation,\n        statusLabel:t.statusLabel, coach:t.coach, predictHref:'#/predict?a='+t.id+'&b=brazil',\n        kpis:[ {value:String(t.strength),label:'Power score'},{value:String(t.elo),label:'Team rating'},{value:'#'+t.fifaRank,label:'World rank'},{value:t.points+' pts',label:'Group form'} ],\n        hasMatches:matches.length>0, matches:matches.map(m=>this.matchCard(m)), stars, posGroups };\n      return out;\n    }\n\n    // ===================== POWER =====================\n    if(seg==='power'){\n      out.isPower=true;\n      out.powerList=DB.teams.slice().sort((x,y)=>y.adjRating-x.adjRating).map((t,i)=>({\n        rankLabel:String(i+1), name:t.name, grad:t.grad, strength:t.strength, statusLabel:t.statusLabel, href:'#/team/'+t.id }));\n      return out;\n    }\n\n    // ===================== BRACKET =====================\n    if(seg==='bracket'){\n      out.isBracket=true;\n      const r32cards=DB.r32.map(m=>{\n        const c=this.matchCard(m);\n        return { href:'#/match/'+m.id, home:c.home, away:c.away, dateLabel:this.dateLabel(m.kickoff), bg:'#fff', textColor:'#16181d', cursor:'pointer' };\n      });\n      const tbd=(n)=>Array.from({length:n}).map(()=>({ href:'#', home:{code:'TBD',grad:'#e7dfd0'}, away:{code:'TBD',grad:'#e7dfd0'}, dateLabel:'', bg:'#f6f1e7', textColor:'#b3a890', cursor:'default' }));\n      out.bracketCols=[\n        { title:'Round of 32', ties:r32cards.concat(tbd(1)) },\n        { title:'Round of 16', ties:tbd(2) },\n        { title:'Quarter-finals', ties:tbd(2) },\n        { title:'Semi-finals', ties:tbd(1) },\n        { title:'Final', ties:tbd(1) }\n      ];\n      const DOT={in:'#138a5e',out:'#d8cfbf',live:'#f4b400'};\n      out.groupsVM=DB.groups.map(g=>({ name:g.name, rows:g.standings.map(s=>{ const t=DB.byId[s.teamId];\n        return { code:t.shortCode, grad:t.grad, ptsLabel:s.points+' pts', dot:DOT[t.statusKind], href:'#/team/'+t.id,\n          nameColor: t.statusKind==='out'?'#a59a85':'#16181d' }; }) }));\n      return out;\n    }\n\n    // ===================== PLAYERS =====================\n    if(seg==='players'){\n      out.isPlayers=true;\n      const pos=params.pos||'all', sort=params.sort||'goals';\n      let pl=DB.allPlayers.slice();\n      if(pos!=='all') pl=pl.filter(p=>p.pos===pos);\n      pl.sort((a,b)=> sort==='caps'?b.caps-a.caps : sort==='age'?a.age-b.age : b.goals-a.goals);\n      pl=pl.slice(0,120);\n      out.playerTotal=DB.allPlayers.length;\n      out.posOptions=[['all','All positions'],['GK','Goalkeepers'],['DF','Defenders'],['MF','Midfielders'],['FW','Forwards']].map(([k,l])=>({id:k,label:l,selected:k===pos}));\n      out.sortOptions=[['goals','Most goals'],['caps','Most caps'],['age','Youngest']].map(([k,l])=>({id:k,label:l,selected:k===sort}));\n      out.onPosChange=(e)=>{ location.hash='#/players?pos='+e.target.value+'&sort='+sort; };\n      out.onSortChange=(e)=>{ location.hash='#/players?pos='+pos+'&sort='+e.target.value; };\n      out.playerList=pl.map(p=>{ const t=DB.byId[p.teamId];\n        return { href:'#/player/'+p.id, name:p.name, teamGrad:t.grad, metaLine:t.shortCode+' · '+this.POSNAME[p.pos]+' · '+p.club,\n          statValue: sort==='caps'?String(p.caps):sort==='age'?String(p.age):String(p.goals),\n          statLabel: sort==='caps'?'caps':sort==='age'?'age':'goals' }; });\n      return out;\n    }\n\n    // ===================== PLAYER DETAIL =====================\n    if(seg==='player'){\n      out.isPlayer=true;\n      const p=DB.allPlayers.find(x=>x.id===id);\n      if(!p){ out.playerVM={ ok:false }; return out; }\n      const t=DB.byId[p.teamId];\n      out.playerVM={ ok:true, name:p.name, initials:this.initials(p.name), posColor:DB.POSCOLOR[p.pos], posName:this.POSNAME[p.pos],\n        teamName:t.name, teamHref:'#/team/'+t.id, club:p.club,\n        kpis:[ {value:String(p.caps),label:'Caps'},{value:String(p.goals),label:'Goals'},{value:(p.caps?(p.goals/p.caps).toFixed(2):'0.00'),label:'Goals per cap'},{value:String(p.age),label:'Age'} ] };\n      return out;\n    }\n\n    // ===================== SEARCH =====================\n    if(seg==='search'){\n      out.isSearch=true;\n      const q=(params.q||'').trim(), ql=q.toLowerCase();\n      out.searchHeading = q?('Search: “'+q+'”'):'Search';\n      const teams=q?DB.teams.filter(t=>t.name.toLowerCase().includes(ql)).slice(0,8):[];\n      const players=q?DB.allPlayers.filter(p=>p.name.toLowerCase().includes(ql)).slice(0,30):[];\n      out.search={ hasTeams:teams.length>0, hasPlayers:players.length>0, empty: q&&!teams.length&&!players.length,\n        teams:teams.map(t=>({ name:t.name, grad:t.grad, href:'#/team/'+t.id })),\n        players:players.map(p=>{ const t=DB.byId[p.teamId]; return { href:'#/player/'+p.id, name:p.name, teamGrad:t.grad, metaLine:t.shortCode+' · '+this.POSNAME[p.pos]+' · '+p.club }; }) };\n      return out;\n    }\n\n    out.isNotFound=true;\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
