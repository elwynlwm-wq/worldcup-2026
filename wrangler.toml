# Cloudflare config for the site (Pages) + the writer-facing warehouse (D1).
# Used by: `wrangler pages deploy ./dist` and `wrangler d1 execute ...`.
name = "worldcup-2026-now"
compatibility_date = "2026-07-01"
pages_build_output_dir = "dist"

# D1 — the live warehouse the editorial/writer agents read. The pipeline
# publishes the full built SQLite here each run (full replace).
[[d1_databases]]
binding = "WAREHOUSE"
database_name = "worldcup-site"
database_id = "fa7b603e-53e3-450f-adc4-a1e3133adaaa"
